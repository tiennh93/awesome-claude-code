        <!-- Owner name -->
        <text x="140" y="64" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#ffffff" opacity="0.9" filter="url(#textGlow)">gurusup</text>
        <text x="246" y="64" font-family="'Courier New', monospace" font-size="16" font-weight="normal"
              fill="#00ffff" opacity="0.95"> | 64 ⭐</text>
      </g>
      <!-- Repo: severity1/claude-code-prompt-improver -->
