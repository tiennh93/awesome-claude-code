              fill="#586069">davila7</text>
        <text x="246" y="64" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="500"
              fill="#6a737d">| 29.5K ★</text>
      </g>
